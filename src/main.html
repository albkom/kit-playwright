<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kit Playwright</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { color: #333; }
      table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
      th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
      th { background: #f5f5f5; }
    </style>
  </head>
  <body>
    <h1 id="greeting"></h1>

    <h2>Arithmetic results</h2>
    <table>
      <thead>
        <tr><th>Operation</th><th>Result</th></tr>
      </thead>
      <tbody id="results"></tbody>
    </table>

    <script src="lib.js"></script>
    <script>
      // Greeting
      document.getElementById('greeting').textContent = lib.greet('World');

      // Arithmetic demo
      const operations = [
        { label: '3 + 4',       value: lib.add(3, 4) },
        { label: '10 - 3',      value: lib.subtract(10, 3) },
        { label: '6 × 7',       value: lib.multiply(6, 7) },
        { label: '15 ÷ 3',      value: lib.divide(15, 3) },
        { label: '8 ÷ 0',       value: lib.divide(8, 0) },
      ];

      const tbody = document.getElementById('results');
      operations.forEach(({ label, value }) => {
        const row = tbody.insertRow();
        row.insertCell().textContent = label;
        const cell = row.insertCell();
        cell.textContent = value;
        cell.dataset.result = value;
      });
    </script>
  </body>
</html>
