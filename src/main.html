<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kit Playwright</title>
    <script src="./lib.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
      }
      .content-area, .command-area {
        width: 80%;
        max-width: 600px;
        height: 100%;
        max-height: 100%;
        margin: 10px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div data-role="content-area" class="content-area"></div>
      <div data-role="command-area" class="command-area"></div>
    </div>

    <script>
      const stage = document.getElementById('stage');

      // Listen for timeline messages dispatched by the test runner.
      // Each event carries { type, json } where json is a JSON string.
      // Add your own handlers below to update the DOM based on type.
      window.addEventListener('kit:message', (e) => {
        const { type, json } = e.detail;
        // Track the last received event for test assertions.
        stage.dataset.lastType = type;

        // TODO - Add target event handler
        lib.handleMessage(json);
      });
    </script>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const timeline = params.get('timeline');
        if (!timeline) return;
        fetch('/timelines/' + encodeURIComponent(timeline) + '.json')
          .then(function (r) { return r.json(); })
          .then(function (timeline) {
            timeline
              .sort(function (a, b) { return a.milliseconds - b.milliseconds; })
              .forEach(function (event) {
                setTimeout(function () {
                  window.dispatchEvent(
                    new CustomEvent('kit:message', { detail: { type: event.type, json: event.json } })
                  );
                }, event.milliseconds);
              });
          });
      }());
    </script>
  </body>
</html>
